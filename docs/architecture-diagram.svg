<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 780" font-family="Menlo, Consolas, 'JetBrains Mono', monospace" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182ce"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38a169"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="780" fill="#fafafa" rx="8"/>

  <!-- ===== USER ===== -->
  <rect x="360" y="18" width="100" height="40" rx="20" fill="#2b6cb0" stroke="#1a365d" stroke-width="2"/>
  <text x="410" y="43" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">User</text>

  <line x1="410" y1="58" x2="410" y2="85" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== WAKEUP MENU ===== -->
  <rect x="322" y="85" width="176" height="42" rx="6" fill="#edf2f7" stroke="#4a5568" stroke-width="2"/>
  <text x="410" y="111" text-anchor="middle" fill="#2d3748" font-weight="bold" font-size="14">Wakeup Menu</text>

  <line x1="410" y1="127" x2="410" y2="155" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== CLI / TELEGRAM BRANCH ===== -->
  <rect x="160" y="155" width="140" height="42" rx="6" fill="#bee3f8" stroke="#2b6cb0" stroke-width="2"/>
  <text x="230" y="181" text-anchor="middle" fill="#1a365d" font-weight="bold" font-size="14">CLI</text>

  <rect x="530" y="155" width="140" height="42" rx="6" fill="#bee3f8" stroke="#2b6cb0" stroke-width="2"/>
  <text x="600" y="181" text-anchor="middle" fill="#1a365d" font-weight="bold" font-size="14">Telegram</text>

  <line x1="410" y1="127" x2="230" y2="155" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="127" x2="600" y2="155" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== MODES (CLI SIDE) ===== -->
  <!-- Agent mode -->
  <rect x="30" y="230" width="150" height="40" rx="6" fill="#fff" stroke="#e53e3e" stroke-width="2"/>
  <text x="105" y="255" text-anchor="middle" fill="#c53030" font-weight="bold">Agent</text>

  <line x1="230" y1="176" x2="105" y2="230" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Plan mode -->
  <rect x="200" y="230" width="140" height="40" rx="6" fill="#fff" stroke="#dd6b20" stroke-width="2"/>
  <text x="270" y="255" text-anchor="middle" fill="#c05621" font-weight="bold">Plan</text>

  <line x1="230" y1="197" x2="270" y2="230" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Ask mode -->
  <rect x="30" y="300" width="150" height="40" rx="6" fill="#fff" stroke="#3182ce" stroke-width="2"/>
  <text x="105" y="325" text-anchor="middle" fill="#2b6cb0" font-weight="bold">Ask</text>

  <line x1="105" y1="270" x2="105" y2="300" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Pragmatist mode -->
  <rect x="200" y="300" width="140" height="40" rx="6" fill="#fff" stroke="#38a169" stroke-width="2"/>
  <text x="270" y="325" text-anchor="middle" fill="#2f855a" font-weight="bold">Pragmatist</text>

  <line x1="270" y1="270" x2="270" y2="300" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== TELEGRAM COMMANDS ===== -->
  <rect x="530" y="230" width="140" height="35" rx="6" fill="#fff" stroke="#2b6cb0" stroke-width="1.5"/>
  <text x="600" y="252" text-anchor="middle" fill="#2b6cb0" font-family="sans-serif" font-size="12">/ask</text>
  <rect x="530" y="275" width="140" height="35" rx="6" fill="#fff" stroke="#2b6cb0" stroke-width="1.5"/>
  <text x="600" y="297" text-anchor="middle" fill="#2b6cb0" font-family="sans-serif" font-size="12">/agent</text>
  <rect x="530" y="320" width="140" height="35" rx="6" fill="#fff" stroke="#2b6cb0" stroke-width="1.5"/>
  <text x="600" y="342" text-anchor="middle" fill="#2b6cb0" font-family="sans-serif" font-size="12">/plan</text>

  <line x1="600" y1="197" x2="600" y2="230" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="265" x2="600" y2="275" stroke="#4a5568" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="600" y1="310" x2="600" y2="320" stroke="#4a5568" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== TOOL LOOP (shared by Agent + Plan steps) ===== -->
  <rect x="30" y="380" width="230" height="100" rx="6" fill="#fff5f5" stroke="#e53e3e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="145" y="400" text-anchor="middle" fill="#c53030" font-weight="bold" font-size="12">ToolLoopAgent</text>
  <text x="145" y="418" text-anchor="middle" fill="#718096" font-size="11">(max 67 / 30 steps)</text>
  <text x="145" y="440" text-anchor="middle" fill="#4a5568" font-size="11">━ File tools (staged)</text>
  <text x="145" y="458" text-anchor="middle" fill="#4a5568" font-size="11">━ Shell execution</text>
  <text x="145" y="476" text-anchor="middle" fill="#4a5568" font-size="11">━ Repo sandbox tools</text>

  <line x1="105" y1="340" x2="105" y2="380" stroke="#e53e3e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="340" x2="230" y2="380" stroke="#dd6b20" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5 3"/>

  <!-- ===== STAGED FILE APPROVAL ===== -->
  <rect x="30" y="520" width="230" height="90" rx="6" fill="#fff" stroke="#805ad5" stroke-width="2"/>
  <text x="145" y="542" text-anchor="middle" fill="#6b46c1" font-weight="bold" font-size="12">Staged File Overlay</text>
  <text x="145" y="562" text-anchor="middle" fill="#718096" font-size="11">(in-memory, pending)</text>

  <line x1="145" y1="480" x2="145" y2="520" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Approval branches -->
  <line x1="145" y1="610" x2="70" y2="640" stroke="#38a169" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="145" y1="610" x2="220" y2="640" stroke="#e53e3e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="20" y="640" width="100" height="36" rx="6" fill="#c6f6d5" stroke="#38a169" stroke-width="1.5"/>
  <text x="70" y="663" text-anchor="middle" fill="#276749" font-weight="bold" font-size="12">Apply → Disk</text>

  <rect x="180" y="640" width="80" height="36" rx="6" fill="#fed7d7" stroke="#e53e3e" stroke-width="1.5"/>
  <text x="220" y="663" text-anchor="middle" fill="#c53030" font-weight="bold" font-size="12">Clear</text>

  <!-- ===== REPO SANDBOX CONTAINER ===== -->
  <rect x="320" y="380" width="180" height="160" rx="8" fill="#f0fff4" stroke="#38a169" stroke-width="2"/>
  <text x="410" y="400" text-anchor="middle" fill="#276749" font-weight="bold">Repo Sandbox</text>
  <line x1="330" y1="410" x2="490" y2="410" stroke="#38a169" stroke-width="1"/>
  <text x="410" y="432" text-anchor="middle" fill="#4a5568" font-size="11">git clone</text>
  <text x="410" y="450" text-anchor="middle" fill="#4a5568" font-size="11">Runtime detection</text>
  <text x="410" y="468" text-anchor="middle" fill="#4a5568" font-size="11">Dockerfile gen</text>
  <text x="410" y="486" text-anchor="middle" fill="#4a5568" font-size="11">Image build</text>
  <text x="410" y="504" text-anchor="middle" fill="#4a5568" font-size="11">Run / Start</text>
  <text x="410" y="528" text-anchor="middle" fill="#718096" font-size="10">─── isolation ───</text>

  <!-- Arrow from ToolLoop to Repo Sandbox -->
  <line x1="260" y1="430" x2="320" y2="430" stroke="#38a169" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ===== READ-ONLY AREA (Ask / Plan tools) ===== -->
  <rect x="320" y="565" width="180" height="75" rx="6" fill="#ebf8ff" stroke="#3182ce" stroke-width="1.5"/>
  <text x="410" y="587" text-anchor="middle" fill="#2b6cb0" font-weight="bold" font-size="12">Read-Only + Web Tools</text>
  <text x="410" y="607" text-anchor="middle" fill="#4a5568" font-size="11">read_file, list_files, grep</text>
  <text x="410" y="627" text-anchor="middle" fill="#4a5568" font-size="11">web_search, web_crawl, fetch_url</text>

  <line x1="270" y1="325" x2="410" y2="565" stroke="#3182ce" stroke-width="1.5" marker-end="url(#arrow-blue)" stroke-dasharray="5 3"/>

  <!-- ===== PRAGMATIST PATH ===== -->
  <rect x="370" y="285" width="140" height="35" rx="4" fill="#e6fffa" stroke="#38a169" stroke-width="1"/>
  <text x="440" y="307" text-anchor="middle" fill="#276749" font-size="11">Clone → Detect</text>
  <rect x="370" y="325" width="140" height="35" rx="4" fill="#e6fffa" stroke="#38a169" stroke-width="1"/>
  <text x="440" y="347" text-anchor="middle" fill="#276749" font-size="11">Prompt → Run</text>

  <line x1="340" y1="320" x2="440" y2="285" stroke="#38a169" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="440" y1="320" x2="440" y2="325" stroke="#38a169" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== DOCKER CONTAINER (output of sandbox) ===== -->
  <rect x="560" y="400" width="160" height="120" rx="8" fill="#edf2f7" stroke="#718096" stroke-width="2"/>
  <text x="640" y="425" text-anchor="middle" fill="#2d3748" font-weight="bold" font-size="13">Docker</text>
  <text x="640" y="443" text-anchor="middle" fill="#2d3748" font-size="12">Container</text>
  <line x1="570" y1="453" x2="710" y2="453" stroke="#a0aec0" stroke-width="1"/>
  <text x="640" y="472" text-anchor="middle" fill="#718096" font-size="10">--memory=512m</text>
  <text x="640" y="488" text-anchor="middle" fill="#718096" font-size="10">--cpus=1</text>
  <text x="640" y="504" text-anchor="middle" fill="#e53e3e" font-size="10" font-weight="bold">--network none</text>

  <line x1="500" y1="460" x2="560" y2="460" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== OUTPUT ===== -->
  <rect x="560" y="570" width="160" height="36" rx="6" fill="#fefcbf" stroke="#d69e2e" stroke-width="1.5"/>
  <text x="640" y="593" text-anchor="middle" fill="#744210" font-weight="bold" font-size="13">stdout / stderr</text>

  <line x1="640" y1="520" x2="640" y2="570" stroke="#d69e2e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="710" width="350" height="55" rx="4" fill="#edf2f7" stroke="#cbd5e0" stroke-width="1"/>
  <text x="45" y="730" fill="#4a5568" font-size="11" font-weight="bold">Legend:</text>
  <rect x="45" y="738" width="12" height="12" rx="2" fill="#fff5f5" stroke="#e53e3e" stroke-width="1"/>
  <text x="62" y="749" fill="#4a5568" font-size="10">Mutation path</text>
  <rect x="145" y="738" width="12" height="12" rx="2" fill="#ebf8ff" stroke="#3182ce" stroke-width="1"/>
  <text x="162" y="749" fill="#4a5568" font-size="10">Read-only path</text>
  <rect x="255" y="738" width="12" height="12" rx="2" fill="#f0fff4" stroke="#38a169" stroke-width="1"/>
  <text x="272" y="749" fill="#4a5568" font-size="10">Sandbox path</text>
</svg>